spring.application.name=projeto-ambiental
server.port=8080

# Define o tamanho maximo de arquivo e requisicao para o upload de fotos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Inicializacao automatica do banco de dados usando o arquivo data.sql
spring.sql.init.mode=always

# ===================================================================
# CONFIGURACAO PARA POSTGRESQL (Ajustado para ler do Docker .env)
# ===================================================================
# Tenta ler a variavel DB_HOST do docker (que vale 'db'). Se nao achar (como na sua IDE), usa 'localhost'
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bd_atividade_extensionista}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# CONFIGURACOES DO HIBERNATE / JPA
# ===================================================================
# update: Atualiza a estrutura de tabelas automaticamente sem apagar os dados existentes
spring.jpa.hibernate.ddl-auto=validate

# Mostra e formata as consultas SQL geradas pelo Java no console do PC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
api.security.token.secret=12345678
