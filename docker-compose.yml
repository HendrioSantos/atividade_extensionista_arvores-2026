version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: bd_atividade_extensionista
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bd_atividade_extensionista"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: hendriohns/projeto-ambiental-api:1.0
    container_name: spring_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bd_atividade_extensionista
      - DB_USER=postgres
      - DB_PASS=postgres
